services:
  backend:
    build: ./backend
    container_name: habsify_dev
    command: >
      sh -c "
      sleep 5 &&
      uv run python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    
  db:
    image: postgres:16
    container_name: habsify_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure
  redis:
    image: redis:6.2-alpine
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data

  celery_worker:
    build: ./backend
    command: ["uv", "run", "celery", "-A", "habsify", "worker", "-l", "info"]
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

  celery_beat:
    build: ./backend
    command: ["uv", "run", "celery", "-A", "habsify", "beat", "-l", "info"]
    volumes: 
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - redis

volumes:
  pgdata:
  redis_data:
