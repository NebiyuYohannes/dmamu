version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: habsify_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - habsify_pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend          
    container_name: habsify_backend
    env_file: ./.env          
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app        
    command: ["gunicorn", "habsify.wsgi:application", "--bind", "0.0.0.0:8000"]

volumes:
  habsify_pgdata:
